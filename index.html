<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>IPL 2026 Fantasy — Group A</title>
<style>
  :root {
    --bg: #0f1117;
    --bg2: #1a1d27;
    --bg3: #22263a;
    --text: #f0f0f0;
    --muted: #8890a4;
    --border: #2a2f45;
    --gold: #f5c842;
    --silver: #b0b8c8;
    --bronze: #cd7f32;
    --accent: #60a5fa;
    --success: #4ade80;
    --error: #f87171;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    background: var(--bg); 
    color: var(--text); 
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
    min-height: 100vh;
    -webkit-tap-highlight-color: transparent;
  }
  .header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .back-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    display: none;
  }
  .back-btn.show { display: block; }
  .header-title { flex: 1; }
  .header-title h1 { font-size: 17px; font-weight: 600; }
  .header-title p { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .updated-badge {
    font-size: 10px;
    padding: 3px 9px;
    border-radius: 20px;
    background: #1e3a5f;
    color: #60a5fa;
    border: 1px solid #2563eb44;
    white-space: nowrap;
  }
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 60vh;
    gap: 12px;
    color: var(--muted);
  }
  .spinner {
    width: 36px;
    height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .podium {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    padding: 18px 16px 10px;
  }
  .pod {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 10px;
    text-align: center;
    cursor: pointer;
    transition: transform .15s, border-color .15s;
  }
  .pod:active { transform: scale(0.97); }
  .pod.r1 { border-color: var(--gold); background: #1c1700; }
  .pod.r2 { border-color: var(--silver); }
  .pod.r3 { border-color: var(--bronze); }
  .pod-medal { font-size: 24px; margin-bottom: 5px; }
  .pod-name { font-size: 11px; font-weight: 600; margin-bottom: 3px; line-height: 1.3; }
  .pod-pts { font-size: 21px; font-weight: 700; }
  .pod-sub { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .section { padding: 4px 16px 20px; }
  .sec-title { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; font-weight: 600; margin-bottom: 10px; }
  
  .sq-row {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 13px 15px;
    margin-bottom: 9px;
    cursor: pointer;
    transition: border-color .15s, background .15s;
    display: flex;
    align-items: center;
    gap: 11px;
  }
  .sq-row:hover { border-color: #444; background: var(--bg3); }
  .sq-rank { width: 27px; height: 27px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; }
  .sq-info { flex: 1; min-width: 0; }
  .sq-name { font-size: 14px; font-weight: 600; }
  .sq-tags { display: flex; gap: 5px; margin-top: 4px; flex-wrap: wrap; }
  .tag { font-size: 10px; padding: 2px 7px; border-radius: 20px; border: 1px solid; }
  .sq-bar-wrap { width: 100%; background: #ffffff0d; border-radius: 3px; height: 3px; margin-top: 7px; overflow: hidden; }
  .sq-bar { height: 100%; border-radius: 3px; transition: width .5s ease; }
  .sq-summary { margin-top: 6px; display: flex; gap: 14px; align-items: center; }
  .sq-summary-item { font-size: 11px; }
  .sq-summary-item .label { color: var(--muted); }
  .sq-summary-item .value { color: var(--text); font-weight: 600; margin-left: 3px; }
  .sq-pts { text-align: right; flex-shrink: 0; }
  .sq-pts-val { font-size: 21px; font-weight: 700; }
  .sq-pts-lbl { font-size: 10px; color: var(--muted); }
  
  /* COMPARISON SECTION */
  .compare-section { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin: 16px; }
  .compare-title { font-size: 13px; font-weight: 600; margin-bottom: 12px; color: var(--text); }
  .compare-selectors { display: grid; grid-template-columns: 1fr auto 1fr; gap: 10px; align-items: center; margin-bottom: 12px; }
  .compare-select { padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg3); font-size: 13px; color: var(--text); width: 100%; }
  .compare-vs { font-size: 12px; color: var(--muted); font-weight: 600; }
  .compare-btn { width: 100%; padding: 10px; background: var(--accent); color: white; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background .15s; }
  .compare-btn:hover { background: #3b8eea; }
  .compare-btn:disabled { background: var(--border); cursor: not-allowed; }
  .compare-result { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
  .compare-teams { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .compare-team { text-align: center; padding: 10px; background: var(--bg3); border-radius: 8px; }
  .compare-team-name { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .compare-team-pts { font-size: 24px; font-weight: 700; }
  .compare-battlefield { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; margin-top: 12px; background: var(--border); border-radius: 10px; overflow: hidden; }
  .compare-side { background: var(--bg2); padding: 8px; }
  .compare-side-header { font-size: 11px; font-weight: 700; padding: 8px; text-align: center; text-transform: uppercase; letter-spacing: 0.05em; position: sticky; top: 0; z-index: 1; }
  .compare-player-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 8px; font-size: 12px; border-bottom: 1px solid var(--border); }
  .compare-player-row:last-child { border-bottom: none; }
  .compare-player-name { font-weight: 500; }
  .compare-player-pts { font-weight: 700; }
  .compare-total-row { display: flex; justify-content: space-between; padding: 10px 8px; font-size: 13px; font-weight: 700; background: var(--bg3); margin-top: 4px; border-radius: 6px; }
  
  #vDetail { display: none; }
  .d-hero { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin: 16px 16px 14px; }
  .d-hero-top { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .d-avatar { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 17px; font-weight: 700; flex-shrink: 0; }
  .d-squad-name { font-size: 19px; font-weight: 700; }
  .d-owner { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .d-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .stat { background: var(--bg3); border-radius: 10px; padding: 11px; text-align: center; }
  .stat-v { font-size: 19px; font-weight: 700; }
  .stat-l { font-size: 10px; color: var(--muted); margin-top: 2px; }
  
  .tabs { display: flex; border-bottom: 1px solid var(--border); padding: 0 16px; overflow-x: auto; -ms-overflow-style: none; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tb { background: none; border: none; color: var(--muted); padding: 12px 13px; font-size: 12px; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; white-space: nowrap; }
  .tb.act { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
  
  /* COMPACT TABLE */
  .compact-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; margin-top: 8px; position: relative; }
  .compact-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .compact-table th { font-size: 9px; color: var(--text); text-align: left; padding: 8px 6px; border-bottom: 2px solid var(--border); font-weight: 700; background: linear-gradient(to bottom, #22263a, #1a1d27); white-space: nowrap; position: sticky; left: 0; z-index: 1; text-transform: uppercase; letter-spacing: 0.03em; }
  .compact-table th.player-col { min-width: 140px; max-width: 140px; position: sticky; left: 0; background: linear-gradient(to bottom, #22263a, #1a1d27); z-index: 2; }
  .compact-table th.match-col { text-align: center; min-width: 70px; max-width: 100px; overflow: hidden; text-overflow: ellipsis; }
  .compact-table th.total-col { text-align: right; position: sticky; right: 0; background: linear-gradient(to bottom, #22263a, #1a1d27); z-index: 2; min-width: 60px; }
  .compact-table td { padding: 6px; border-bottom: 1px solid #ffffff08; background: var(--bg2); vertical-align: middle; }
  .compact-table td.player-col { position: sticky; left: 0; background: var(--bg2); z-index: 1; min-width: 140px; max-width: 140px; }
  .compact-table td.total-col { position: sticky; right: 0; background: var(--bg2); z-index: 1; text-align: right; font-weight: 600; min-width: 60px; }
  .compact-table tr:hover td { background: var(--bg3); }
  .compact-table tr:hover td.player-col, .compact-table tr:hover td.total-col { background: var(--bg3); }
  .compact-table td.match-col { text-align: center; font-size: 11px; min-width: 70px; max-width: 100px; }
  
  .ptable { width: 100%; border-collapse: collapse; }
  .ptable th { font-size: 10px; color: var(--muted); text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); font-weight: 500; }
  .ptable th.r { text-align: right; }
  .ptable td { padding: 11px 10px; border-bottom: 1px solid #ffffff08; font-size: 13px; vertical-align: middle; }
  .ptable tr:active td { background: var(--bg3); }
  .pname { display: flex; align-items: center; gap: 6px; }
  .rtag { font-size: 9px; padding: 1px 5px; border-radius: 8px; font-weight: 600; }
  .rc { background: #f5c84222; color: var(--gold); border: 1px solid #f5c84244; }
  .rvc { background: #b0b8c822; color: var(--silver); border: 1px solid #b0b8c844; }
  .rimpact { background: #4ade8022; color: var(--success); border: 1px solid #4ade8044; }
  .tr { text-align: right; }
  .c-pos { color: var(--success); font-weight: 600; }
  .c-neg { color: var(--error); font-weight: 600; }
  .c-muted { color: var(--muted); }
  .clickable-pts { text-decoration: underline dotted var(--muted); cursor: pointer; }
  
  /* SCROLL INDICATOR */
  .scroll-indicator { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); background: var(--accent); color: white; padding: 6px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; pointer-events: none; animation: pulse 2s infinite; box-shadow: 0 2px 8px #60a5fa44; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
  .table-wrapper { position: relative; }
  .scroll-indicator.hidden { display: none; }
  
  /* COLLAPSIBLE SECTIONS */
  .matches-section { margin-top: 12px; }
  .section-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; cursor: pointer; user-select: none; }
  .section-header:hover .section-title { color: var(--accent); }
  .section-title { font-size: 12px; font-weight: 600; color: var(--text); }
  .section-toggle { font-size: 11px; color: var(--accent); display: flex; align-items: center; gap: 4px; }
  .section-content { display: none; overflow: hidden; }
  .section-content.expanded { display: block; }
  
  .m-summary { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 13px 15px; margin: 14px 16px 12px; display: flex; justify-content: space-between; align-items: center; }
  .m-summary-info { font-size: 12px; color: var(--muted); }
  .m-summary-pts { font-size: 26px; font-weight: 700; }
  
  .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
  .modal.show { display: flex; }
  .m-content { background: var(--bg2); width: 100%; max-width: 360px; border-radius: 18px; border: 1px solid var(--border); overflow: hidden; animation: pop .2s ease-out; }
  @keyframes pop { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .m-head { padding: 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .m-title { font-size: 15px; font-weight: 700; }
  .m-close { font-size: 20px; color: var(--muted); cursor: pointer; padding: 4px; }
  .m-body { padding: 8px 16px; max-height: 60vh; overflow-y: auto; }
  .break-row { display: flex; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid #ffffff05; font-size: 13px; }
  .break-row:last-child { border-bottom: none; }
  .break-val { font-weight: 600; }
  .m-footer { background: var(--bg3); padding: 16px; display: flex; justify-content: space-between; align-items: center; font-weight: 700; border-top: 1px solid var(--border); }
  .m-total-lbl { color: var(--muted); font-size: 12px; font-weight: 500; }
  
  @media(max-width: 480px) { .podium { gap: 7px; padding: 14px 12px 8px; } .pod-pts { font-size: 18px; } .pod-name { font-size: 10px; } }
</style>
</head>
<body>

<div class="header">
  <button class="back-btn" id="backBtn" onclick="goHome()">← Back</button>
  <div class="header-title">
    <h1 id="hTitle">Group A Leaderboard</h1>
    <p id="hSub">Private League · 5 Teams · Dream11 T20 Rules</p>
  </div>
  <span class="updated-badge" id="updBadge">Loading…</span>
</div>

<div id="vHome">
  <div class="loading" id="loadingEl">
    <div class="spinner"></div>
    <div>Syncing latest scores…</div>
  </div>
  <div id="homeContent" style="display:none">
    <div class="podium" id="podium"></div>
    
    <!-- COMPARISON SECTION -->
    <div class="compare-section">
      <div class="compare-title">🔍 Compare Squads</div>
      <div class="compare-selectors">
        <select class="compare-select" id="compareTeam1">
          <option value="">Select Squad 1</option>
        </select>
        <span class="compare-vs">VS</span>
        <select class="compare-select" id="compareTeam2">
          <option value="">Select Squad 2</option>
        </select>
      </div>
      <button class="compare-btn" id="compareBtn" onclick="runComparison()" disabled>Compare Teams</button>
      <div id="comparisonResult" style="display:none"></div>
    </div>
    
    <div class="section">
      <div class="sec-title">Current Standings</div>
      <div id="sqList"></div>
    </div>
  </div>
</div>

<div id="vDetail">
  <div id="dHero"></div>
  <div class="tabs" id="dTabs"></div>
  <div id="dBody" style="padding:0 16px 40px"></div>
</div>

<div class="modal" id="modal" onclick="closeModal()">
  <div class="m-content" onclick="event.stopPropagation()">
    <div class="m-head">
      <div class="m-title" id="mTitle">Breakdown</div>
      <div class="m-close" onclick="closeModal()">×</div>
    </div>
    <div class="m-body" id="mBody"></div>
    <div class="m-footer">
      <div class="m-total-lbl" id="mMultiplier">Base Points</div>
      <div id="mTotalPts">0</div>
    </div>
  </div>
</div>

<script>
const DATA_URL = "https://raw.githubusercontent.com/aashishsingh-png/ipl2026-fantasy/main/data.json";

const SQUADS = {
  "Thakur Titans": { color:"#3b82f6", C:"Sanju Samson", VC:"Mitchell Marsh", owner:"Aashish", players:["Axar Patel","Heinrich Klaasen","Jasprit Bumrah","Josh Hazlewood","Mitchell Marsh","Nicholas Pooran","Riyan Parag","Sanju Samson","Shivam Dube","Nehal Wadhera","Prashant Veer"] },
  "Dhurandhar": { color:"#22c55e", C:"Ishan Kishan", VC:"Philip Salt", owner:"Pradeep", players:["Ajinkya Rahane","Cameron Green","Ishan Kishan","Philip Salt","Quinton de Kock","Ruturaj Gaikwad","Sunil Narine","Tilak Varma","Priyansh Arya","Trent Boult","Washington Sundar"] },
  "Kasauli Tigers": { color:"#f97316", C:"Virat Kohli", VC:"Hardik Pandya", owner:"Arun", players:["Hardik Pandya","Jos Buttler","Mohammed Siraj","Pat Cummins","Rashid Khan","Shreyas Iyer","Virat Kohli","Yashasvi Jaiswal","Dewald Brevis","Prabhsimran Singh","Akshat Raghuwanshi"] },
  "J Squad": { color:"#ec4899", C:"Vaibhav Sooryavanshi", VC:"Rishabh Pant", owner:"Kishan", players:["Arshdeep Singh","Bhuvneshwar Kumar","Kuldeep Yadav","Mitchell Starc","Rajat Patidar","Ravindra Jadeja","Rishabh Pant","Suryakumar Yadav","Travis Head","Vaibhav Sooryavanshi","Yuzvendra Chahal"] },
  "Team Godlike": { color:"#a855f7", C:"KL Rahul", VC:"Rohit Sharma", owner:"Vishal", players:["Abhishek Sharma","Aiden Markram","KL Rahul","Marco Jansen","Rohit Sharma","Sai Sudharsan","Shubman Gill","Varun Chakaravarthy","Ayush Mhatre","Devdutt Padikkal","Finn Allen"] }
};

let DATA = null, currentSq = null;

const srBonus = (r, b) => {
  if (b < 10) return 0;
  const s = (r / b) * 100;
  if (s > 170) return 6; if (s >= 150) return 4; if (s >= 130) return 2;
  if (s < 50) return -6; if (s <= 59.99) return -4; if (s <= 70) return -2;
  return 0;
};

const ecoBonus = (r, o) => {
  if (o < 2) return 0;
  const e = r / o;
  if (e < 5) return 6; if (e < 6) return 4; if (e <= 7) return 2;
  if (e > 12) return -6; if (e > 11) return -4; if (e > 10) return -2;
  return 0;
};

function getBreakdown(d) {
  if (!d) return [];
  const b = [];
  if (d.lineup) b.push({ l: "Playing XI", p: 4 });
  if (d.impact) b.push({ l: "Impact Player", p: 4 });
  if (d.runs > 0) b.push({ l: `Runs (${d.runs})`, p: d.runs });
  if (d.fours > 0) b.push({ l: `Fours (${d.fours})`, p: d.fours });
  if (d.sixes > 0) b.push({ l: `Sixes (${d.sixes})`, p: d.sixes * 2 });
  if (d.runs >= 100) b.push({ l: "Century Bonus", p: 16 });
  else if (d.runs >= 50) b.push({ l: "Half-Century", p: 8 });
  else if (d.runs >= 30) b.push({ l: "30 Run Bonus", p: 4 });
  if (d.duck) b.push({ l: "Duck Out", p: -2 });
  if (d.balls > 0) { const s = srBonus(d.runs, d.balls); if (s !== 0) b.push({ l: "Strike Rate", p: s }); }
  if (d.wickets > 0) b.push({ l: `Wickets (${d.wickets})`, p: d.wickets * 25 });
  if (d.blbw > 0) b.push({ l: "Bowled/LBW", p: d.blbw * 8 });
  if (d.wickets >= 5) b.push({ l: "5-Wkt Haul", p: 16 });
  else if (d.wickets >= 3) b.push({ l: "3-Wkt Bonus", p: 4 });
  if (d.maidens > 0) b.push({ l: "Maiden Over", p: d.maidens * 12 });
  if (d.overs > 0) { const e = ecoBonus(d.runs_conceded, d.overs); if (e !== 0) b.push({ l: "Economy Rate", p: e }); }
  if (d.catches > 0) b.push({ l: `Catches (${d.catches})`, p: d.catches * 8 });
  if (d.catches >= 3) b.push({ l: "3-Catch Bonus", p: 4 });
  if (d.stumpings > 0) b.push({ l: "Stumping", p: d.stumpings * 12 });
  if (d.rod > 0) b.push({ l: "Run Out (Direct)", p: d.rod * 12 });
  if (d.roi > 0) b.push({ l: "Run Out (Indir.)", p: d.roi * 6 });
  return b;
}

const calcBase = (d) => getBreakdown(d).reduce((s, x) => s + x.p, 0);

function getFinal(p, sqN, mi) {
  const d = DATA.players[p]?.[`m${mi}`];
  if (!d) return null;
  const b = calcBase(d);
  if (p === SQUADS[sqN].C) return b * 2;
  if (p === SQUADS[sqN].VC) return b * 1.5;
  return b;
}

function sqTotal(sqName) {
  return DATA.matches.reduce((acc, m, i) => acc + (m.done ? SQUADS[sqName].players.reduce((sum, p) => sum + (getFinal(p, sqName, i) || 0), 0) : 0), 0);
}

function sqAverage(sqName) {
  const matchesPlayed = DATA.matches.filter(m => m.done).length;
  return matchesPlayed > 0 ? Math.round(sqTotal(sqName) / matchesPlayed) : 0;
}

function sqBestMatch(sqName) {
  let best = 0;
  DATA.matches.forEach((m, i) => {
    if (m.done) {
      const pts = SQUADS[sqName].players.reduce((sum, p) => sum + (getFinal(p, sqName, i) || 0), 0);
      if (pts > best) best = pts;
    }
  });
  return best;
}

async function loadData() {
  try {
    const r = await fetch(`${DATA_URL}?t=${Date.now()}`);
    DATA = await r.json();
    document.getElementById("updBadge").textContent = "Updated " + (DATA.lastUpdated || "Live");
    renderHome();
  } catch (e) {
    document.getElementById("loadingEl").innerHTML = `<div style="color:var(--error)">Failed to load. Verify GitHub URL.</div>`;
  }
}

function renderHome() {
  document.getElementById("loadingEl").style.display = "none";
  document.getElementById("homeContent").style.display = "block";
  
  const ranked = Object.keys(SQUADS).map(sq => ({ 
    name: sq, 
    total: sqTotal(sq)
  })).sort((a, b) => b.total - a.total);
  
  const max = ranked[0].total || 1;
  const medals = ["🥇", "🥈", "🥉"], pods = ["r1", "r2", "r3"];

  document.getElementById("podium").innerHTML = ranked.slice(0, 3).map((s, i) => {
    const c = SQUADS[s.name].color;
    return `<div class="pod ${pods[i]}" onclick="goDetail('${s.name}')" style="${i === 0 ? 'border-color:' + c : ''}">
      <div class="pod-medal">${medals[i]}</div>
      <div class="pod-name" style="color:${c}">${s.name}</div>
      <div class="pod-pts" style="color:${c}">${s.total}</div>
      <div class="pod-sub">${SQUADS[s.name].owner}</div>
    </div>`;
  }).join("");

  // Populate comparison dropdowns
  const squadOptions = Object.keys(SQUADS).map(sq => 
    `<option value="${sq}">${sq}</option>`
  ).join("");
  document.getElementById("compareTeam1").innerHTML = '<option value="">Select Squad 1</option>' + squadOptions;
  document.getElementById("compareTeam2").innerHTML = '<option value="">Select Squad 2</option>' + squadOptions;
  
  document.getElementById("compareTeam1").onchange = checkCompareReady;
  document.getElementById("compareTeam2").onchange = checkCompareReady;

  document.getElementById("sqList").innerHTML = ranked.map((s, i) => {
    const c = SQUADS[s.name].color;
    const pct = (s.total / max) * 100;
    const avg = sqAverage(s.name);
    const best = sqBestMatch(s.name);
    const matchesPlayed = DATA.matches.filter(m => m.done).length;
    
    return `<div class="sq-row" onclick="goDetail('${s.name}')">
      <div class="sq-rank" style="background:${c}20;color:${c}">${i + 1}</div>
      <div class="sq-info">
        <div class="sq-name">${s.name}</div>
        <div class="sq-tags">
          <span class="tag" style="color:${c};border-color:${c}33;background:${c}11">C: ${SQUADS[s.name].C}</span>
          <span class="tag" style="color:var(--muted);border-color:var(--border)">${SQUADS[s.name].owner}</span>
        </div>
        <div class="sq-bar-wrap"><div class="sq-bar" style="width:${pct}%;background:${c}"></div></div>
        <div class="sq-summary">
          <span class="sq-summary-item"><span class="label">Matches:</span><span class="value">${matchesPlayed}</span></span>
          <span class="sq-summary-item"><span class="label">Avg:</span><span class="value">${avg}</span></span>
          <span class="sq-summary-item"><span class="label">Best:</span><span class="value">${best}</span></span>
        </div>
      </div>
      <div class="sq-pts"><div class="sq-pts-val" style="color:${c}">${s.total}</div><div class="sq-pts-lbl">pts</div></div>
    </div>`;
  }).join("");
}

function checkCompareReady() {
  const t1 = document.getElementById("compareTeam1").value;
  const t2 = document.getElementById("compareTeam2").value;
  document.getElementById("compareBtn").disabled = !(t1 && t2 && t1 !== t2);
}

function runComparison() {
  const t1 = document.getElementById("compareTeam1").value;
  const t2 = document.getElementById("compareTeam2").value;
  if (!t1 || !t2 || t1 === t2) return;
  
  const sq1 = SQUADS[t1], sq2 = SQUADS[t2];
  const total1 = sqTotal(t1), total2 = sqTotal(t2);
  const winner = total1 > total2 ? t1 : t2;
  const diff = Math.abs(total1 - total2);
  
  const team1Players = sq1.players.map(p => {
    const pts = DATA.matches.reduce((sum, m, i) => sum + (m.done ? (getFinal(p, t1, i) || 0) : 0), 0);
    return { player: p, points: pts, isC: p === sq1.C, isVC: p === sq1.VC };
  }).sort((a, b) => b.points - a.points);
  
  const team2Players = sq2.players.map(p => {
    const pts = DATA.matches.reduce((sum, m, i) => sum + (m.done ? (getFinal(p, t2, i) || 0) : 0), 0);
    return { player: p, points: pts, isC: p === sq2.C, isVC: p === sq2.VC };
  }).sort((a, b) => b.points - a.points);
  
  document.getElementById("comparisonResult").style.display = "block";
  document.getElementById("comparisonResult").innerHTML = `
    <div class="compare-teams">
      <div class="compare-team" style="background:${sq1.color}18;border:2px solid ${winner === t1 ? sq1.color : 'var(--border)'}">
        <div class="compare-team-name">${t1}</div>
        <div class="compare-team-pts" style="color:${sq1.color}">${total1}</div>
        ${winner === t1 ? '<div style="font-size:20px;margin-top:4px">🏆</div>' : ''}
      </div>
      <div class="compare-team" style="background:${sq2.color}18;border:2px solid ${winner === t2 ? sq2.color : 'var(--border)'}">
        <div class="compare-team-name">${t2}</div>
        <div class="compare-team-pts" style="color:${sq2.color}">${total2}</div>
        ${winner === t2 ? '<div style="font-size:20px;margin-top:4px">🏆</div>' : ''}
      </div>
    </div>
    <div style="text-align:center;font-size:12px;color:var(--muted);margin-bottom:12px">
      ${winner} leads by <strong>${diff} points</strong>
    </div>
    <div class="compare-battlefield">
      <div class="compare-side" style="border-right:1px solid var(--border)">
        <div class="compare-side-header" style="background:${sq1.color};color:white">${t1}</div>
        ${team1Players.map(({ player, points, isC, isVC }) => `
          <div class="compare-player-row">
            <div class="compare-player-name">
              ${player}
              ${isC ? ' <span class="rtag rc">C</span>' : ''}
              ${isVC ? ' <span class="rtag rvc">VC</span>' : ''}
            </div>
            <div class="compare-player-pts" style="color:${sq1.color}">${points}</div>
          </div>
        `).join("")}
        <div class="compare-total-row">
          <span>Total</span>
          <span style="color:${sq1.color}">${total1}</span>
        </div>
      </div>
      <div class="compare-side">
        <div class="compare-side-header" style="background:${sq2.color};color:white">${t2}</div>
        ${team2Players.map(({ player, points, isC, isVC }) => `
          <div class="compare-player-row">
            <div class="compare-player-name">
              ${player}
              ${isC ? ' <span class="rtag rc">C</span>' : ''}
              ${isVC ? ' <span class="rtag rvc">VC</span>' : ''}
            </div>
            <div class="compare-player-pts" style="color:${sq2.color}">${points}</div>
          </div>
        `).join("")}
        <div class="compare-total-row">
          <span>Total</span>
          <span style="color:${sq2.color}">${total2}</span>
        </div>
      </div>
    </div>
  `;
}

function goDetail(sq) {
  currentSq = sq;
  const s = SQUADS[sq], c = s.color;
  const total = sqTotal(sq);
  const rank = Object.keys(SQUADS).map(k => ({ k, t: sqTotal(k) })).sort((a, b) => b.t - a.t).findIndex(x => x.k === sq) + 1;
  
  document.getElementById("dHero").innerHTML = `
    <div class="d-hero-top">
      <div class="d-avatar" style="background:${c}22;color:${c};border:2px solid ${c}55">${sq[0]}</div>
      <div><div class="d-squad-name" style="color:${c}">${sq}</div><div class="d-owner">${s.owner} · Rank #${rank}</div></div>
    </div>
    <div class="d-stats">
      <div class="stat"><div class="stat-v" style="color:${c}">${total}</div><div class="stat-l">Total Pts</div></div>
      <div class="stat"><div class="stat-v" style="color:var(--muted)">${sqAverage(sq)}</div><div class="stat-l">Avg/Match</div></div>
      <div class="stat"><div class="stat-v" style="color:var(--gold)">${sqBestMatch(sq)}</div><div class="stat-l">Best Match</div></div>
    </div>`;

  document.getElementById("dTabs").innerHTML = `<button class="tb act" onclick="renderTab(-1, this)">Overall</button>` + 
    DATA.matches.map((m, i) => `<button class="tb" onclick="renderTab(${i}, this)">${m.label}</button>`).join("");
  
  renderTab(-1);
  document.getElementById("vHome").style.display = "none";
  document.getElementById("vDetail").style.display = "block";
  document.getElementById("backBtn").classList.add("show");
  document.getElementById("hTitle").textContent = sq;
  document.getElementById("hSub").textContent = `${s.C} (C) · ${s.VC} (VC)`;
  window.scrollTo(0, 0);
}

function renderTab(mi, el) {
  if (el) { 
    document.querySelectorAll('.tb').forEach(b => b.classList.remove('act')); 
    el.classList.add('act'); 
  }
  
  const s = SQUADS[currentSq], c = s.color, body = document.getElementById("dBody");
  
  if (mi === -1) {
    // Overall tab with collapsible sections
    const rows = s.players.map(p => ({ 
      p, 
      matchPts: DATA.matches.map((m, i) => getFinal(p, currentSq, i)), 
      total: DATA.matches.reduce((v, m, i) => v + (getFinal(p, currentSq, i) || 0), 0) 
    })).sort((a, b) => b.total - a.total);

    const doneMatches = DATA.matches.filter(m => m.done);
    const recentCount = Math.min(10, doneMatches.length);
    const recentMatches = doneMatches.slice(-recentCount);
    const hasMoreMatches = doneMatches.length > recentCount;

    body.innerHTML = `
      <div class="matches-section">
        <div class="section-header" style="cursor:default;padding-bottom:6px;">
          <div class="section-title">🔥 Recent ${recentCount} Match${recentCount > 1 ? 'es' : ''}</div>
        </div>
        <div class="section-content expanded">
          <div class="table-wrapper">
            <div class="compact-table-wrap" id="recentTable">
              <div class="scroll-indicator" id="scrollIndRecent">Scroll →</div>
              <table class="compact-table">
                <thead><tr>
                  <th class="player-col">Player</th>
                  ${recentMatches.map(m => `<th class="match-col" title="${m.teams || m.label}">${m.label.split(' ')[0]}</th>`).join("")}
                  <th class="total-col">Total</th>
                </tr></thead>
                <tbody>${rows.map(r => {
                  const recentPts = DATA.matches.map((m, i) => m.done ? r.matchPts[i] : null).filter(x => x !== null).slice(-recentCount);
                  return `<tr>
                    <td class="player-col">
                      <div class="pname" style="font-size:11px">
                        ${r.p}
                        ${r.p === s.C ? '<span class="rtag rc">C</span>' : ''}
                        ${r.p === s.VC ? '<span class="rtag rvc">VC</span>' : ''}
                      </div>
                    </td>
                    ${recentPts.map(v => `<td class="match-col ${v === null ? 'c-muted' : v > 0 ? 'c-pos' : ''}">${v ?? '—'}</td>`).join("")}
                    <td class="total-col" style="color:${r.total > 0 ? c : 'var(--muted)'};font-size:15px">${r.total || '—'}</td>
                  </tr>`;
                }).join("")}
                </tbody>
              </table>
            </div>
          </div>
        </div>
        
        ${hasMoreMatches ? `
          <div class="section-header" onclick="toggleFullHistory()" style="margin-top:16px;padding-top:12px;border-top:1px solid var(--border)">
            <div class="section-title">📊 View Full Match History (All ${doneMatches.length} Matches)</div>
            <div class="section-toggle" id="fullHistoryToggle">
              Expand <span>▼</span>
            </div>
          </div>
          <div class="section-content" id="fullHistorySection">
            <div class="table-wrapper">
              <div class="compact-table-wrap" id="fullTable">
                <div class="scroll-indicator" id="scrollIndFull">Scroll →</div>
                <table class="compact-table">
                  <thead><tr>
                    <th class="player-col">Player</th>
                    ${doneMatches.map((m, idx) => `<th class="match-col" title="${m.teams || m.label}">M${idx + 1}</th>`).join("")}
                    <th class="total-col">Total</th>
                  </tr></thead>
                  <tbody>${rows.map(r => {
                    const allPts = DATA.matches.map((m, i) => m.done ? r.matchPts[i] : null).filter(x => x !== null);
                    return `<tr>
                      <td class="player-col">
                        <div class="pname" style="font-size:11px">
                          ${r.p}
                          ${r.p === s.C ? '<span class="rtag rc">C</span>' : ''}
                          ${r.p === s.VC ? '<span class="rtag rvc">VC</span>' : ''}
                        </div>
                      </td>
                      ${allPts.map(v => `<td class="match-col ${v === null ? 'c-muted' : v > 0 ? 'c-pos' : ''}">${v ?? '—'}</td>`).join("")}
                      <td class="total-col" style="color:${r.total > 0 ? c : 'var(--muted)'}">${r.total || '—'}</td>
                    </tr>`;
                  }).join("")}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        ` : ''}
      </div>
    `;
    
    setTimeout(() => {
      setupScrollIndicator('recentTable', 'scrollIndRecent');
    }, 100);
    
  } else {
    const m = DATA.matches[mi];
    if (!m.done) { 
      body.innerHTML = `<div style="text-align:center;padding:50px;color:var(--muted)">🏏 Match starts ${m.date}</div>`; 
      return; 
    }
    
    const rows = s.players.map(p => ({ 
      p, 
      base: calcBase(DATA.players[p]?.[`m${mi}`]), 
      final: getFinal(p, currentSq, mi), 
      impact: DATA.players[p]?.[`m${mi}`]?.impact 
    })).sort((a, b) => (b.final || -1) - (a.final || -1));
    
    const matchTotal = s.players.reduce((acc, p) => acc + (getFinal(p, currentSq, mi) || 0), 0);
    
    body.innerHTML = `
      <div class="m-summary">
        <div>
          <div style="font-weight:600">${m.teams || m.label}</div>
          <div class="m-summary-info">${m.date} · Click points for details</div>
        </div>
        <div class="m-summary-pts" style="color:${c}">${matchTotal}</div>
      </div>
      <table class="ptable">
        <thead><tr><th>Player</th><th class="r">Base</th><th class="r">Final</th></tr></thead>
        <tbody>${rows.map(r => `<tr>
          <td><div class="pname">${r.p}
            ${r.p === s.C ? '<span class="rtag rc">C</span>' : ''}
            ${r.p === s.VC ? '<span class="rtag rvc">VC</span>' : ''}
            ${r.impact ? '<span class="rtag rimpact">I</span>' : ''}
          </div></td>
          <td class="tr c-muted">${r.base || '—'}</td>
          <td class="tr ${r.final > 0 ? 'c-pos clickable-pts' : r.final === null ? 'c-muted' : ''}" onclick="openBreakdown('${r.p}', ${mi})">${r.final ?? '—'}</td>
        </tr>`).join("")}
        </tbody>
      </table>`;
  }
}

function toggleFullHistory() {
  const section = document.getElementById('fullHistorySection');
  const toggle = document.getElementById('fullHistoryToggle');
  
  if (section.classList.contains('expanded')) {
    section.classList.remove('expanded');
    toggle.innerHTML = 'Expand <span>▼</span>';
  } else {
    section.classList.add('expanded');
    toggle.innerHTML = 'Collapse <span>▲</span>';
    setTimeout(() => setupScrollIndicator('fullTable', 'scrollIndFull'), 100);
  }
}

function setupScrollIndicator(tableId, indicatorId) {
  const table = document.getElementById(tableId);
  const indicator = document.getElementById(indicatorId);
  
  if (!table || !indicator) return;
  
  const checkScroll = () => {
    if (table.scrollWidth > table.clientWidth && table.scrollLeft < 50) {
      indicator.classList.remove('hidden');
    } else {
      indicator.classList.add('hidden');
    }
  };
  
  checkScroll();
  table.addEventListener('scroll', checkScroll);
  window.addEventListener('resize', checkScroll);
}

function openBreakdown(p, mi) {
  const d = DATA.players[p]?.[`m${mi}`]; 
  if (!d) return;
  
  const b = getBreakdown(d), sq = SQUADS[currentSq];
  const mult = p === sq.C ? 2 : p === sq.VC ? 1.5 : 1;
  
  document.getElementById("mTitle").textContent = p;
  document.getElementById("mBody").innerHTML = b.map(x => `<div class="break-row"><span>${x.l}</span><span class="break-val">${x.p > 0 ? '+' : ''}${x.p}</span></div>`).join("");
  document.getElementById("mMultiplier").textContent = mult > 1 ? `Applied ${mult}x Multiplier` : "Base Points";
  document.getElementById("mTotalPts").textContent = Math.round(calcBase(d) * mult);
  document.getElementById("modal").classList.add("show");
}

function closeModal() { 
  document.getElementById("modal").classList.remove("show"); 
}

function goHome() { 
  document.getElementById("vHome").style.display = "block"; 
  document.getElementById("vDetail").style.display = "none"; 
  document.getElementById("backBtn").classList.remove("show"); 
  document.getElementById("hTitle").textContent = "Group A Leaderboard"; 
  document.getElementById("hSub").textContent = "Private League · 5 Teams · Dream11 T20 Rules"; 
}

loadData();
</script>
</body>
</html>
